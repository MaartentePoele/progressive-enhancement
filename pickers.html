<!doctype html>
<html lang="nl">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Favorieten picker / Progressive Enhancement / FDND</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
  <link href="assets/styles.css" rel="stylesheet">
  <style>
    /* Schrijf hier gewoon je CSS voor dit component */

    /* Hint: Dit component kun je volledig met HTML en CSS bouwen */
    form {
      background-color: #A675F5;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 3rem;
      border-radius: .5rem;
    }

    input {
      field-sizing: content;
      width: fit-content;
      border: none;
      font-size: 1.5rem;
      font-weight: bold;
      border-radius: .25rem;
      padding: 0.5rem 0 0.5rem 1rem;
      display: flex;
      justify-content: space-between;
    }

    /* Hint: Kijk eens naar field-sizing
			   https://developer.mozilla.org/en-US/docs/Web/CSS/field-sizing */
  </style>
</head>

<body>
  <h1>Favorieten picker</h1>

  <form>

    <!-- Hint: hoe kun je aan een invoerelement een lijst meegeven? -->

    <!-- Een lijstje met docenten
			Charley Muhren
			Cyd Stumpel
			Dion Pieters
			Dorien Drees
			Joost Faber
			Justus Sturkenboom
			Koop Reynders
			Krijn Hoetmer
			Sanne 't Hooft
			Suus ten Voorde
    -->

    <input list="test">

    <datalist id="test">
      <option value="Charley Muhren">
      <option value="Cyd Stumpel">
      <option value="Dion Pieters">
      <option value="Dorien Drees">
      <option value="Joost Faber">
      <option value="Justus Sturkenboom">
      <option value="Koop Reynders">
      <option value="Krijn Hoetmer">
      <option value="Sanne 't Hooft">
      <option value="Suus ten Voorde">
    </datalist>
    <!-- De kleurcodes van FDND:
			#A675F5
			#050542
			#66E5BF
			#FFFC86
			-->

  </form>

  <details open>
    <summary>Demo video</summary>
    <video src="assets/pickers.mp4" width="749" height="417" controls muted autoplay loop>
      <a href="assets/pickers.mp4">assets/pickers.mp4</a>
    </video>
  </details>
</body>

</html>
